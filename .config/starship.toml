# Midnight Obsidian Starship Prompt Config
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$character
"""

# Timeout for commands
command_timeout = 500

[character]
success_symbol = "[󰘧](bold teal) "
error_symbol = "[󰘧](bold red) "

[username]
show_always = false
format = "[$user]($style)@ "
style_user = "bold blue"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style_var = "bold blue"

[directory]
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "~"
style = "bold blue"
format = "[$path]($style) "

[git_branch]
symbol = " "
style = "bold teal"
format = "on [$symbol$branch]($style) "

[git_status]
style = "red"
format = "[$all_status$ahead_behind]($style) "

[palette]
teal = "#00f5c6"
blue = "#4f76fd"
