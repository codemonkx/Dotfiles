general {
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/nx02/.config/sddm/windows_7/background.png
    blur_passes = 0
    color = rgba(0, 0, 0, 1.0)
}

# Clean, simple Windows 7 Profile Picture
image {
    monitor =
    path = /home/nx02/.config/sddm/windows_7/pfp.png
    size = 120
    rounding = 5
    border_size = 3
    border_color = rgba(255, 255, 255, 0.5)
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.4)
}

# Clean Username
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 24
    font_family = Segoe UI, sans-serif
    position = 0, -50
    halign = center
    valign = center
    shadow_passes = 0
}

# Clean Password Box
input-field {
    monitor =
    size = 220, 32
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.4)
    inner_color = rgba(255, 255, 255, 0.95)
    font_color = rgba(0, 0, 0, 1.0)
    fade_on_empty = false
    rounding = -1
    placeholder_text = 
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
    fail_color = rgb(255, 92, 92)
    fail_text = <i>$FAIL</i>
    fail_transition = 200
}


